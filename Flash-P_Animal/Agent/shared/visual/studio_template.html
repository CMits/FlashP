<!DOCTYPE html>
<!--
  FLASH-P Studio — generated by network_to_studio.py.
  A single self-contained app embedding ALL of your built networks. Three views:
    • Browse   — pick a network
    • View     — interactive Cytoscape graph; click a node for its function + edge DOIs
    • Simulate — perturbate the network (KO/KD/OE + treatments), three solvers, live charts
  Faithful port of the website (FLASHP_WEBSITE/Flash-P-AI). No server, no install:
  open by double-click. Markers FLASHP_LIBS / FLASHP_GRAPH_JS / FLASHP_SIM_JS /
  FLASHP_CHART_JS / FLASHP_DATA / FLASHP_TITLE are substituted by the Python generator.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FLASH-P Studio · <!--FLASHP_TITLE--></title>
  <style>
    :root {
      --bg: #fdf8f3; --fg: #221a14; --muted: #847b73; --card: #fffdfb;
      --border: #e6ddd3; --grid: #ece4da; --accent: #d14600;
      --primary: #d14600; --primary-fg: #fdf8f3; --secondary: #f1e9e1; --ring: #d14600;
      --destructive: #dc2626; --pos: #2c7fb8; --neg: #d7301f;
    }
    html.dark {
      --bg: hsl(192 32% 7%); --fg: #e9efe9; --muted: #93a7a0; --card: #11242a;
      --border: #24383f; --grid: rgba(120,150,140,0.16); --accent: #ff7a1a;
      --primary: #ff7a1a; --primary-fg: #11242a; --secondary: #1b2e34; --ring: #ff7a1a;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif; color: var(--fg);
      background: var(--bg); font-size: 14px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    a { color: inherit; }
    button { font-family: inherit; }
    .btn {
      border: 1px solid var(--border); background: var(--card); color: var(--fg);
      border-radius: 6px; cursor: pointer; font-size: 12.5px; padding: 6px 10px;
    }
    .btn:hover { border-color: var(--primary); }
    .btn.primary { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); font-weight: 600; }
    .btn.active { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
    .chip {
      font-size: 10.5px; padding: 1px 8px; border-radius: 999px;
      background: var(--secondary); color: var(--fg);
    }
    input, select {
      border: 1px solid var(--border); background: var(--bg); color: var(--fg);
      border-radius: 6px; padding: 6px 8px; font-size: 13px; outline: none;
    }
    input:focus, select:focus { box-shadow: 0 0 0 2px color-mix(in srgb, var(--ring) 35%, transparent); }
    .uplabel { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }

    /* ---- hover info tooltips ---- */
    .info {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 999px; border: 1px solid var(--muted);
      color: var(--muted); font-size: 9.5px; font-style: normal; font-weight: 700;
      line-height: 1; cursor: help; position: relative; vertical-align: middle;
      margin-left: 5px; text-transform: none; letter-spacing: 0;
    }
    .info:hover { color: var(--primary); border-color: var(--primary); }
    .info::after {
      content: attr(data-tip);
      position: absolute; left: 50%; top: calc(100% + 8px); transform: translateX(-50%);
      width: 240px; max-width: 62vw; background: var(--card); color: var(--fg);
      border: 1px solid var(--border); border-radius: 9px; padding: 9px 11px;
      font-size: 11.5px; font-weight: 400; line-height: 1.5; text-align: left;
      box-shadow: 0 6px 18px rgba(0,0,0,.16); z-index: 60;
      opacity: 0; visibility: hidden; transition: opacity .12s; pointer-events: none; white-space: normal;
    }
    /* CSS ::after tooltip is replaced by a position:fixed floating tip in JS (escapes overflow clipping). */
    .info::after { display: none; }

    /* ---- top bar ---- */
    #topbar {
      display: flex; align-items: center; gap: 10px; padding: 8px 14px;
      border-bottom: 1px solid var(--border); background: var(--card); flex: none;
    }
    #topbar .brand { font-weight: 700; font-size: 15px; }
    #topbar .brand .flask { color: var(--primary); }
    #topbar .crumb { color: var(--muted); font-size: 13px; }
    #topbar .spacer { flex: 1; }
    #topbar .navbtns { display: flex; gap: 6px; }

    main { flex: 1; min-height: 0; overflow: hidden; position: relative; }
    .view { position: absolute; inset: 0; display: none; }
    .view.show { display: block; }

    /* ---- browse ---- */
    #view-browse { overflow: auto; }
    .browse-head { padding: 18px 22px 12px; }
    .browse-head h1 { font-size: 21px; margin: 0 0 2px; }
    .browse-head .sub { color: var(--muted); font-size: 13px; }
    .filterbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; padding: 0 22px 14px; border-bottom: 1px solid var(--border); }
    .filterbar .search { position: relative; flex: 1; min-width: 200px; max-width: 380px; display: flex; align-items: center; }
    .filterbar .search svg { position: absolute; left: 10px; opacity: .5; pointer-events: none; }
    .filterbar .search input { width: 100%; padding-left: 31px; border-radius: 10px; }
    .filterbar select { min-width: 150px; border-radius: 10px; cursor: pointer; }
    .filterbar .count { margin-left: auto; color: var(--muted); font-size: 12px; }
    .filterbar .count b { color: var(--fg); }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; padding: 20px 22px; align-content: start; }
    @media (min-width: 1500px) { .cards { grid-template-columns: repeat(4, 1fr); } }
    .card {
      position: relative; border: 1px solid var(--border); background: var(--card);
      border-radius: 16px; overflow: hidden; cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .card:hover {
      transform: translateY(-2px); box-shadow: 0 12px 26px rgba(0,0,0,.09);
      border-color: color-mix(in srgb, var(--primary) 32%, transparent);
    }
    .card-stripe { height: 4px; width: 100%; }
    .card-body { padding: 18px; }
    .card-top { display: flex; align-items: flex-start; gap: 12px; }
    .card-icon { width: 44px; height: 44px; border-radius: 12px; flex: none; display: flex; align-items: center; justify-content: center; transition: transform .2s; }
    .card:hover .card-icon { transform: scale(1.1); }
    .card-titles { min-width: 0; flex: 1; padding-top: 1px; }
    .card-titles h3 { margin: 0; font-size: 14px; font-weight: 700; text-transform: capitalize; line-height: 1.25; transition: color .15s;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card:hover .card-titles h3 { color: var(--primary); }
    .card-sp { font-size: 12px; font-style: italic; opacity: .85; margin-top: 2px; }
    .card-acc { font-size: 14px; font-weight: 800; flex: none; font-variant-numeric: tabular-nums; }
    .card-stats { display: flex; align-items: center; gap: 14px; margin-top: 14px; padding-top: 11px;
      border-top: 1px solid color-mix(in srgb, var(--border) 60%, transparent); font-size: 11px; color: var(--muted); }
    .card-stats .dot { width: 6px; height: 6px; border-radius: 999px; display: inline-block; margin-right: 5px; vertical-align: middle; }
    .card-stats .dot.blue { background: #60a5fa; } .card-stats .dot.green { background: #4ade80; }
    .card-sim { margin-left: auto; border: 1px solid var(--border); background: var(--card); color: var(--primary);
      border-radius: 7px; padding: 3px 9px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all .15s; }
    .card-sim:hover { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
    .card-hint { text-align: center; margin-top: 10px; font-size: 10px; font-weight: 600; color: var(--primary); opacity: 0; transition: opacity .2s; }
    .card:hover .card-hint { opacity: .85; }
    .browse-empty { padding: 40px 22px; color: var(--muted); }

    /* ---- graph canvases ---- */
    .cy { position: absolute; inset: 0; background-color: var(--bg);
      background-image: radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
      background-size: 22px 22px; }
    .panelbar {
      position: absolute; z-index: 5; display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
      padding: 5px; border: 1px solid var(--border); background: var(--card);
      border-radius: 9px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .toolbar select, .toolbar button {
      height: 30px; border: 1px solid var(--border); background: var(--bg); color: var(--fg);
      border-radius: 6px; cursor: pointer; font-size: 12.5px; padding: 0 8px;
    }
    .toolbar button { width: 32px; padding: 0; font-size: 15px; line-height: 1; }
    .toolbar button.active { background: var(--border); }
    .toolbar .sep { width: 1px; align-self: stretch; background: var(--border); margin: 2px 1px; }
    .legend { flex-direction: column; align-items: flex-start; font-size: 12px; }
    .legend h4 { margin: 2px 0 4px; font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
    .legend .row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .legend .sw { width: 13px; height: 13px; border-radius: 3px; flex: none; }
    .legend .ln { width: 18px; height: 0; border-top-width: 2px; border-top-style: solid; flex: none; }
    .nodepanel {
      position: absolute; z-index: 6; overflow: auto; padding: 14px;
      border: 1px solid var(--border); background: var(--card); border-radius: 11px;
      box-shadow: 0 2px 10px rgba(0,0,0,.12); display: none; font-size: 13px; line-height: 1.45;
    }
    .nodepanel.show { display: block; }
    .nodepanel .close { float: right; cursor: pointer; color: var(--muted); border: none; background: none; font-size: 18px; }
    .nodepanel h2 { margin: 0 0 2px; font-size: 17px; }
    .nodepanel .ty { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .nodepanel .badge { display: inline-block; font-size: 10.5px; padding: 1px 7px; border-radius: 999px; background: var(--secondary); margin-left: 6px; vertical-align: middle; }
    .nodepanel .fn { margin: 6px 0 10px; }
    .nodepanel .desc { color: var(--muted); margin: 0 0 12px; }
    .nodepanel h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 12px 0 5px; }
    .nodepanel ul { list-style: none; margin: 0; padding: 0; }
    .nodepanel li { margin: 4px 0; }
    .nodepanel .arrow { font-weight: 700; }
    .nodepanel a { text-decoration: none; border-bottom: 1px dotted currentColor; font-size: 11.5px; }
    .nodepanel .nodoi { color: var(--muted); font-size: 11.5px; }

    /* ---- view layout ---- */
    #view-view .graphwrap { position: absolute; inset: 0; }
    #view-view .toolbar { left: 12px; top: 12px; max-width: calc(100% - 24px); }
    #view-view .vtitle {
      position: absolute; right: 12px; top: 12px; z-index: 5; max-width: 44%;
      padding: 7px 11px; border: 1px solid var(--border); background: var(--card);
      border-radius: 9px; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-size: 12.5px;
    }
    #view-view .vtitle b { font-size: 13.5px; } #view-view .vtitle .sp { color: var(--muted); font-style: italic; }
    #view-view .legend { left: 12px; bottom: 12px; }
    #view-view .nodepanel { right: 12px; top: 108px; bottom: 12px; width: 320px; max-width: calc(100% - 24px); }
    #view-view .simbtn { display: block; width: 100%; margin-top: 9px; }

    /* ---- simulate layout ---- */
    #view-sim { display: none; }
    #view-sim.show { display: flex; flex-direction: column; }
    .sim-bar { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-bottom: 1px solid var(--border); background: var(--card); flex: none; }
    .sim-bar .flask { color: var(--primary); }
    .sim-grid { flex: 1; min-height: 0; display: grid; grid-template-columns: 310px minmax(300px, 1fr) minmax(340px, 1.2fr); gap: 12px; padding: 12px; overflow: hidden; }
    @media (max-width: 1000px) { .sim-grid { grid-template-columns: 1fr; overflow: auto; } }
    .pane { border: 1px solid var(--border); background: var(--card); border-radius: 11px; }
    .builder { padding: 14px; overflow: auto; }
    .builder .group { margin-bottom: 14px; }
    .builder .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .builder .addrow { display: flex; gap: 6px; }
    .builder .addrow input { flex: 1; min-width: 0; }
    .builder .iconbtn { width: 34px; flex: none; }
    .pertrow { display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; font-size: 12.5px; margin-top: 5px; }
    .pertrow .mono { font-family: ui-monospace, Menlo, Consolas, monospace; }
    .pertrow .rm { border: none; background: none; cursor: pointer; color: var(--muted); font-size: 14px; }
    .net-pane { position: relative; overflow: hidden; }
    .net-head { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .net-canvaswrap { position: absolute; top: 38px; inset: 0 0 0 0; }
    .actioncard { position: absolute; left: 0; right: 0; bottom: 0; z-index: 10; border-top: 1px solid var(--border); background: color-mix(in srgb, var(--card) 95%, transparent); padding: 10px 12px; backdrop-filter: blur(3px); display: none; }
    .actioncard.show { display: block; }
    .actioncard .acbtns { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .results { overflow: auto; padding: 0; }
    .results .inner { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
    .empty { height: 100%; min-height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: var(--muted); border: 1px dashed var(--border); border-radius: 11px; margin: 14px; }
    .summary { display: flex; flex-wrap: wrap; gap: 10px 22px; border: 1px solid var(--border); border-radius: 11px; padding: 14px; }
    .summary .cell .k { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-bottom: 2px; }
    .summary .cell .v { font-size: 15px; font-weight: 700; }
    .ymodes { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 12px; }
    .ymodes .pill { border: 1px solid var(--border); border-radius: 999px; padding: 2px 10px; cursor: pointer; font-weight: 600; }
    .ymodes .pill.active { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
    .block { border: 1px solid var(--border); border-radius: 11px; padding: 14px; }
    .block h3 { margin: 0 0 8px; font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
    .ntable { width: 100%; }
    .ntable .head, .ntable .trow { display: grid; grid-template-columns: 1fr auto auto auto; gap: 12px; align-items: center; }
    .ntable .head { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); border-bottom: 1px solid var(--border); padding: 0 6px 4px; }
    .ntable .scroll { max-height: 320px; overflow: auto; }
    .ntable .trow { padding: 4px 6px; border-radius: 6px; cursor: pointer; font-size: 12px; text-align: right; }
    .ntable .trow:hover { background: var(--secondary); }
    .ntable .trow.sel { background: color-mix(in srgb, var(--secondary) 80%, transparent); }
    .ntable .trow .name { text-align: left; display: flex; align-items: center; gap: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .ntable .dot { width: 8px; height: 8px; border-radius: 999px; border: 1px solid var(--muted); flex: none; }
    .ntable .dot.on { background: var(--primary); border-color: var(--primary); }
    .footnote { font-size: 11px; color: var(--muted); line-height: 1.5; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
  </style>
  <!--FLASHP_LIBS-->
</head>
<body data-view="browse">
  <div id="topbar">
    <span class="brand"><span class="flask">&#9879;</span> FLASH-P Studio</span>
    <span class="crumb" id="crumb"></span>
    <span class="spacer"></span>
    <div class="navbtns">
      <button class="btn" id="nav-browse">Browse</button>
      <button class="btn" id="nav-view" style="display:none">View</button>
      <button class="btn" id="nav-sim" style="display:none">Simulate</button>
      <button class="btn" id="nav-theme" title="Toggle dark mode">&#9680;</button>
    </div>
  </div>

  <main>
    <!-- BROWSE -->
    <section id="view-browse" class="view show">
      <div class="browse-head">
        <h1>Your networks</h1>
        <div class="sub" id="browse-sub"></div>
      </div>
      <div class="filterbar" id="browse-filter"></div>
      <div class="cards" id="cards"></div>
    </section>

    <!-- VIEW -->
    <section id="view-view" class="view">
      <div class="graphwrap">
        <div class="cy" id="view-cy"></div>
        <div class="panelbar toolbar" id="view-toolbar">
          <select id="view-layout" title="Layout"></select>
          <button id="view-relayout" title="Re-run layout">&#8635;</button>
          <span class="sep"></span>
          <button id="view-fit" title="Fit to view">&#10530;</button>
          <button id="view-zin" title="Zoom in">+</button>
          <button id="view-zout" title="Zoom out">&#8722;</button>
          <button id="view-labels" title="Toggle labels">T</button>
          <span class="sep"></span>
          <button id="view-png" title="Download network as PNG image">&#8681; PNG</button>
          <button id="view-svg" title="Download network as SVG (vector)">&#8681; SVG</button>
        </div>
        <div class="vtitle">
          <div id="view-title"></div>
          <button class="btn primary simbtn" id="view-tosim">Run simulation</button>
        </div>
        <div class="panelbar legend" id="view-legend"></div>
        <div class="nodepanel" id="view-panel"></div>
      </div>
    </section>

    <!-- SIMULATE -->
    <section id="view-sim" class="view">
      <div class="sim-bar">
        <span class="flask">&#9879;</span>
        <b>Simulate</b>
        <span class="uplabel" style="margin-left:6px;">Network</span>
        <select id="sim-network"></select>
        <span class="crumb" id="sim-species" style="margin-left:auto;"></span>
      </div>
      <div class="sim-grid">
        <!-- builder -->
        <aside class="pane builder" id="sim-builder"></aside>
        <!-- network -->
        <div class="pane net-pane">
          <div class="net-head"><b style="font-size:13px;">Network</b>
            <span class="crumb" style="font-size:11px;">click a node to perturb it</span>
            <span id="sim-net-info"></span></div>
          <div class="net-canvaswrap"><div class="cy" id="sim-cy"></div></div>
          <div class="actioncard" id="sim-actioncard"></div>
        </div>
        <!-- results -->
        <main class="pane results" id="sim-results"></main>
      </div>
    </section>
  </main>

  <script id="flashp-data" type="application/json"><!--FLASHP_DATA--></script>
  <!--FLASHP_GRAPH_JS-->
  <!--FLASHP_SIM_JS-->
  <!--FLASHP_CHART_JS-->
  <script>
  (function () {
    'use strict';
    var DATA = JSON.parse(document.getElementById('flashp-data').textContent);
    var STYLE = DATA.style;
    var NETWORKS = DATA.networks || [];
    var bySlug = {};
    NETWORKS.forEach(function (n) { bySlug[n.slug] = n; });

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }
    function doiLink(doi) {
      if (!doi) return '<span class="nodoi">no DOI</span>';
      return '<a href="https://doi.org/' + encodeURI(doi) + '" target="_blank" rel="noopener">' + esc(doi) + '</a>';
    }
    function el(html) { var d = document.createElement('div'); d.innerHTML = html; return d.firstElementChild; }
    // Small hover "i" with a plain-text explanation. pos: '' | 'up' | 'left' | 'up left'.
    function info(tip, pos) {
      return '<span class="info' + (pos ? ' ' + pos : '') + '" data-tip="' + esc(tip) + '">i</span>';
    }
    var TIPS = {
      method: 'How the perturbation spreads through the network. Algebraic (Flash-P): solves the steady-state equations — geometric-mean activation, bounded inhibition, with wild type = 1. RWR: random-walk with restart; scores how strongly (and which way) each node is pushed. ODE: integrates Hill-function dynamics to steady state. The method that scored best on this network is preselected.',
      perturb: 'Genes you alter: KO = knockout (activity → 0), KD = knockdown (halved), OE = overexpression (doubled). Add several for double/triple mutants. Tip: click a node in the network panel to add it here.',
      treat: 'Supply a node externally at a fixed level (e.g. a hormone or nutrient), independent of its own regulators. Use this for environmental inputs rather than gene edits.',
      baseline: 'What your perturbation is compared against. Wild type = the unperturbed network. Custom baseline = compare two conditions (e.g. a double mutant vs the single mutant).',
      yaxis: 'Fold vs baseline: each node relative to the baseline (>1 up, <1 down). log₂ fold change: log₂ of that fold, symmetric around 0 (+1 = doubled, −1 = halved). Absolute: the raw steady-state values.',
      outcome: 'The node whose response you are tracking. Defaults to the phenotype, but you can pick any node in the network.',
      converge: 'The model repeats until node values stop changing (a steady state). “Converged” means a stable answer was found; if it did not converge, treat the numbers with extra caution.',
      network: 'Click any node to perturb it (KO / KD / OE) or supply it (exogenous). Perturbed nodes get a coloured ring. Edges: arrows activate, bars (⊣) inhibit.',
    };
    var TYPE_LABELS = window.FLASHP.TYPE_LABELS;
    var SIM = window.FLASHPSIM;

    // ---- view switching ----
    var curSlug = null;
    var viewApp = null, simApp = null;

    function destroyApps() {
      if (viewApp && viewApp.cy) { try { viewApp.cy.destroy(); } catch (e) {} viewApp = null; }
      if (simApp && simApp.cy) { try { simApp.cy.destroy(); } catch (e) {} simApp = null; }
    }
    function setView(name) {
      document.body.setAttribute('data-view', name);
      ['browse', 'view', 'sim'].forEach(function (v) {
        document.getElementById('view-' + v).classList.toggle('show', v === name);
      });
      document.getElementById('nav-view').style.display = curSlug ? '' : 'none';
      document.getElementById('nav-sim').style.display = curSlug ? '' : 'none';
      document.getElementById('crumb').textContent = curSlug ? '· ' + bySlug[curSlug].name : '';
    }

    document.getElementById('nav-browse').onclick = function () { destroyApps(); setView('browse'); };
    document.getElementById('nav-view').onclick = function () { if (curSlug) openView(curSlug); };
    document.getElementById('nav-sim').onclick = function () { if (curSlug) openSim(curSlug); };
    document.getElementById('nav-theme').onclick = function () {
      var dark = document.documentElement.classList.toggle('dark');
      if (viewApp) viewApp.setTheme(dark);
      if (simApp) simApp.setTheme(dark);
      if (simState.result) renderResults();
    };

    // ================= BROWSE =================
    // Species colour + short label, ported from FlashP_GUI SpeciesIcon.SPECIES_MAP.
    var SPECIES_MAP = {
      'arabidopsis thaliana': { hex: '#10b981', label: 'Arabidopsis' },
      'oryza sativa': { hex: '#f59e0b', label: 'Rice' },
      'triticum aestivum': { hex: '#ca8a04', label: 'Wheat' },
      'zea mays': { hex: '#22c55e', label: 'Maize' },
      'solanum lycopersicum': { hex: '#ef4444', label: 'Tomato' },
      'populus trichocarpa': { hex: '#15803d', label: 'Poplar' },
      'eucalyptus': { hex: '#0d9488', label: 'Eucalyptus' },
      'nicotiana': { hex: '#84cc16', label: 'Tobacco' },
      'pisum sativum': { hex: '#4ade80', label: 'Pea' },
      'brachypodium distachyon': { hex: '#059669', label: 'Brachypodium' },
      'hordeum vulgare': { hex: '#a3a307', label: 'Barley' },
      'glycine max': { hex: '#16a34a', label: 'Soybean' },
      'bos taurus': { hex: '#b45309', label: 'Cattle' },
      'homo sapiens': { hex: '#e11d48', label: 'Human' },
      'mus musculus': { hex: '#9333ea', label: 'Mouse' },
    };
    function speciesInfo(sp) {
      var key = (sp || '').toLowerCase().trim();
      for (var k in SPECIES_MAP) { if (key.indexOf(k) >= 0) return SPECIES_MAP[k]; }
      return { hex: '#6366f1', label: sp || '—' };
    }
    function iconSvg(hex) {
      return '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="' + hex +
        '" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
        '<circle cx="6" cy="6.5" r="2.1"/><circle cx="18" cy="7.5" r="2.1"/><circle cx="12" cy="17" r="2.1"/>' +
        '<path d="M7.6 7.8 11 15M16.3 9.1 13 15M8.1 6.8l7.8 .8"/></svg>';
    }
    function accuracyOf(net) {
      var a = net.accuracy || {};
      var bm = net.bestMethod;
      var m = bm && a[bm] ? a[bm] : null;
      if (!m || m.accuracy == null) return null;
      // accuracy_metrics.json stores accuracy as a fraction (0.93) in some networks and
      // already as a percentage (93.0) in others — normalise both to a percent.
      var acc = m.accuracy <= 1 ? m.accuracy * 100 : m.accuracy;
      return Math.round(acc * 10) / 10;
    }
    function accColor(pct) { return pct >= 85 ? '#16a34a' : pct >= 65 ? '#d97706' : '#dc2626'; }

    var filterState = { search: '', species: '', sort: 'name-asc' };

    function renderBrowse() {
      document.getElementById('browse-sub').textContent =
        NETWORKS.length + ' network' + (NETWORKS.length === 1 ? '' : 's') +
        ' embedded · generated ' + (DATA.generated || '');
      var bar = document.getElementById('browse-filter');
      if (!NETWORKS.length) { bar.innerHTML = ''; renderCards(); return; }
      var speciesSet = {};
      NETWORKS.forEach(function (n) { if (n.species) speciesSet[n.species] = true; });
      var speciesOpts = ['<option value="">All species</option>'].concat(
        Object.keys(speciesSet).sort().map(function (s) {
          return '<option value="' + esc(s) + '">' + esc(speciesInfo(s).label) + '</option>';
        })).join('');
      bar.innerHTML =
        '<div class="search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>' +
        '<input id="f-search" placeholder="Search networks…" /></div>' +
        '<select id="f-species">' + speciesOpts + '</select>' +
        '<select id="f-sort">' +
        '<option value="name-asc">Name A–Z</option><option value="name-desc">Name Z–A</option>' +
        '<option value="nodes">Most nodes</option><option value="accuracy">Highest accuracy</option></select>' +
        '<span class="count" id="f-count"></span>';
      var si = bar.querySelector('#f-search'); si.value = filterState.search;
      si.oninput = function () { filterState.search = si.value; renderCards(); };
      var sp = bar.querySelector('#f-species'); sp.value = filterState.species;
      sp.onchange = function () { filterState.species = sp.value; renderCards(); };
      var so = bar.querySelector('#f-sort'); so.value = filterState.sort;
      so.onchange = function () { filterState.sort = so.value; renderCards(); };
      renderCards();
    }

    function renderCards() {
      var cards = document.getElementById('cards');
      if (!NETWORKS.length) {
        cards.innerHTML = '<div class="browse-empty">No networks found. Build one, then regenerate the Studio.</div>';
        return;
      }
      var q = filterState.search.trim().toLowerCase();
      var list = NETWORKS.filter(function (n) {
        if (filterState.species && n.species !== filterState.species) return false;
        if (!q) return true;
        return (n.name || '').toLowerCase().indexOf(q) >= 0 || (n.species || '').toLowerCase().indexOf(q) >= 0;
      }).slice();
      list.sort(function (a, b) {
        switch (filterState.sort) {
          case 'name-desc': return (b.name || '').localeCompare(a.name || '');
          case 'nodes': return b.nNodes - a.nNodes;
          case 'accuracy': return (accuracyOf(b) == null ? -1 : accuracyOf(b)) - (accuracyOf(a) == null ? -1 : accuracyOf(a));
          default: return (a.name || '').localeCompare(b.name || '');
        }
      });
      var cnt = document.getElementById('f-count');
      if (cnt) cnt.innerHTML = 'Showing <b>' + list.length + '</b> of <b>' + NETWORKS.length + '</b>';
      if (!list.length) { cards.innerHTML = '<div class="browse-empty">No networks match your filters.</div>'; return; }
      cards.innerHTML = '';
      list.forEach(function (net) {
        var acc = accuracyOf(net);
        var info = speciesInfo(net.species);
        var card = el(
          '<div class="card">' +
          '<div class="card-stripe" style="background:' + info.hex + '"></div>' +
          '<div class="card-body">' +
          '<div class="card-top">' +
          '<div class="card-icon" style="background:' + info.hex + '26">' + iconSvg(info.hex) + '</div>' +
          '<div class="card-titles"><h3>' + esc(net.name) + '</h3>' +
          (net.species ? '<div class="card-sp" style="color:' + info.hex + '">' + esc(info.label) + '</div>' : '') +
          '</div>' +
          (acc != null ? '<div class="card-acc" style="color:' + accColor(acc) + '">' + acc + '%</div>' : '') +
          '</div>' +
          '<div class="card-stats"><span><i class="dot blue"></i>' + net.nNodes + ' nodes</span>' +
          '<span><i class="dot green"></i>' + net.nEdges + ' edges</span>' +
          '<button class="card-sim">Simulate &rarr;</button></div>' +
          '<div class="card-hint">Click to explore &rarr;</div>' +
          '</div></div>'
        );
        card.onclick = function () { openView(net.slug); };
        card.querySelector('.card-sim').onclick = function (e) { e.stopPropagation(); openSim(net.slug); };
        cards.appendChild(card);
      });
    }

    // ================= VIEW =================
    function openView(slug) {
      destroyApps();
      curSlug = slug;
      var net = bySlug[slug];
      setView('view');
      var titleHtml = '<b>' + esc(net.name) + '</b>' + (net.species ? ' <span class="sp">' + esc(net.species) + '</span>' : '');
      document.getElementById('view-title').innerHTML = titleHtml;
      var panel = document.getElementById('view-panel');
      panel.className = 'nodepanel'; panel.innerHTML = ''; // clear any selection left from a previous network

      function renderPanel(d) {
        if (!d) { panel.className = 'nodepanel'; panel.innerHTML = ''; return; }
        var rows = function (list, dir) {
          if (!list.length) return '<li class="nodoi">none</li>';
          return list.map(function (e) {
            var arrow = e.neg ? '⊣' : '→';
            var col = e.neg ? 'var(--neg)' : 'var(--pos)';
            var left = dir === 'in' ? esc(e.other) : esc(d.id);
            var right = dir === 'in' ? esc(d.id) : esc(e.other);
            return '<li><span class="arrow" style="color:' + col + '">' + left + ' ' + arrow + ' ' + right + '</span><br>' + doiLink(e.doi) + '</li>';
          }).join('');
        };
        panel.innerHTML =
          '<button class="close" title="Close">&times;</button>' +
          '<h2>' + esc(d.id) + (d.src ? '<span class="badge">source</span>' : '') + '</h2>' +
          '<div class="ty">' + esc(TYPE_LABELS[d.ty] || d.ty) + '</div>' +
          (d.fn ? '<div class="fn">' + esc(d.fn) + '</div>' : '') +
          (d.desc ? '<div class="desc">' + esc(d.desc) + '</div>' : '') +
          '<h3>Regulated by (' + d.incomers.length + ')</h3><ul>' + rows(d.incomers, 'in') + '</ul>' +
          '<h3>Regulates (' + d.outgoers.length + ')</h3><ul>' + rows(d.outgoers, 'out') + '</ul>';
        panel.className = 'nodepanel show';
        panel.querySelector('.close').onclick = function () { viewApp.clearSelection(); };
      }

      viewApp = window.FLASHP.init({
        container: document.getElementById('view-cy'),
        data: { meta: { slug: slug }, elements: net.elements, style: STYLE, annById: net.annById },
        opts: { layout: 'elk', dark: document.documentElement.classList.contains('dark'), onSelect: renderPanel },
      });

      var sel = document.getElementById('view-layout');
      sel.innerHTML = '';
      Object.keys(viewApp.LAYOUT_LABELS).forEach(function (k) {
        var o = document.createElement('option'); o.value = k; o.textContent = viewApp.LAYOUT_LABELS[k]; sel.appendChild(o);
      });
      sel.value = 'elk';
      sel.onchange = function () { viewApp.applyLayout(sel.value); };
      document.getElementById('view-relayout').onclick = function () { viewApp.applyLayout(sel.value); };
      document.getElementById('view-fit').onclick = function () { viewApp.fit(); };
      var zoomBy = function (f) {
        var cy = viewApp.cy, b = cy.container().getBoundingClientRect();
        cy.zoom({ level: cy.zoom() * f, renderedPosition: { x: b.width / 2, y: b.height / 2 } });
      };
      document.getElementById('view-zin').onclick = function () { zoomBy(1.3); };
      document.getElementById('view-zout').onclick = function () { zoomBy(1 / 1.3); };
      var labelsOn = true;
      document.getElementById('view-labels').onclick = function () {
        labelsOn = !labelsOn; viewApp.toggleLabels(labelsOn); this.classList.toggle('active', !labelsOn);
      };
      renderLegend(document.getElementById('view-legend'), viewApp);
      document.getElementById('view-tosim').onclick = function () { openSim(slug); };
      var exportBg = function () { return document.documentElement.classList.contains('dark') ? '#0e1b1f' : '#fbfdfc'; };
      document.getElementById('view-png').onclick = function () {
        download(slug + '.png', viewApp.cy.png({ full: true, scale: 3, bg: exportBg() }));
      };
      document.getElementById('view-svg').onclick = function () {
        if (!viewApp.cy.svg) { alert('SVG export unavailable (cytoscape-svg not loaded).'); return; }
        var svg = viewApp.cy.svg({ full: true, bg: exportBg() });
        download(slug + '.svg', 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg));
      };
    }

    function renderLegend(lg, app) {
      var present = app.present.slice().sort();
      var html = '<h4>Node type</h4>';
      present.forEach(function (ty) {
        html += '<div class="row"><span class="sw" style="background:' + app.pick(STYLE.node.fill, ty) +
          ';border:1.5px solid ' + app.pick(STYLE.node.border, ty) + '"></span>' + (TYPE_LABELS[ty] || ty) + '</div>';
      });
      html += '<h4 style="margin-top:8px">Edge</h4>' +
        '<div class="row"><span class="ln" style="border-color:' + app.pick(STYLE.edge.line, 'positive') + '"></span>activates (→)</div>' +
        '<div class="row"><span class="ln" style="border-color:' + app.pick(STYLE.edge.line, 'negative') + '"></span>inhibits (⊣)</div>';
      lg.innerHTML = html;
    }

    // ================= SIMULATE =================
    var RING = { ko: '#d7301f', kd: '#fc8d59', oe: '#2c7fb8', exo: '#2ca25f' };
    var simState = {};

    function resetSimState(net) {
      simState = {
        net: net,
        method: net.bestMethod || 'algebraic',
        genes: [], treatments: [],
        baselineMode: 'wt', baseGenes: [], baseTreatments: [],
        valuesMode: 'log2',
        result: null, testLabel: '', baselineLabel: '',
        outcome: '', selected: [], running: false,
        picked: null,
        nodes: SIM.perturbableNodes(net.net),
      };
    }

    function openSim(slug) {
      destroyApps();
      curSlug = slug;
      var net = bySlug[slug];
      resetSimState(net);
      setView('sim');
      document.getElementById('sim-species').textContent = net.species || '';
      document.getElementById('sim-net-info').innerHTML = info(TIPS.network);
      var nsel = document.getElementById('sim-network');
      nsel.innerHTML = '';
      NETWORKS.forEach(function (n) {
        var o = document.createElement('option'); o.value = n.slug; o.textContent = n.name; nsel.appendChild(o);
      });
      nsel.value = slug;
      nsel.onchange = function () { openSim(nsel.value); };

      buildBuilder();
      renderActionCard(); // picked was reset to null — clear any leftover card from a previous network
      initSimGraph(net);
      renderResults();
    }

    function modShort(m) { return m === 0 ? 'KO' : m === 0.5 ? 'KD' : m >= 2 ? 'OE' : 'WT'; }
    function describe(genes, treats) {
      var g = genes.map(function (x) { return x.node + ' ' + modShort(x.modifier); });
      var t = treats.map(function (x) { return x.node; });
      if (!g.length && !t.length) return 'Wild type';
      var head = g.length ? g.join(' + ') : 'WT';
      return [head].concat(t).join(' + ');
    }
    var PERT_WORD = ['', 'Single', 'Double', 'Triple', 'Quadruple'];

    function buildBuilder() {
      var b = document.getElementById('sim-builder');
      var datalist = '<datalist id="sim-nodelist">' +
        simState.nodes.map(function (n) { return '<option value="' + esc(n.id) + '">' + esc(n.ty) + '</option>'; }).join('') +
        '</datalist>';
      b.innerHTML =
        datalist +
        // method
        '<div class="group"><div class="uplabel" style="margin-bottom:6px;">Method' + info(TIPS.method) + '</div>' +
        '<div class="row2" id="sim-methods">' +
        ['algebraic', 'rwr', 'ode'].map(function (m) {
          return '<button class="btn' + (simState.method === m ? ' active' : '') + '" data-m="' + m + '">' + esc(SIM.METHOD_LABELS[m]) + '</button>';
        }).join('') + '</div></div>' +
        // perturbations
        '<div class="group"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
        '<span class="uplabel">Perturbations' + info(TIPS.perturb) + '</span><span class="crumb" id="sim-mutlabel" style="font-size:11px;"></span></div>' +
        '<div class="addrow"><input id="sim-geneinput" list="sim-nodelist" placeholder="Add gene / node…" />' +
        '<select id="sim-genemod">' + SIM.MODIFIER_LABELS.map(function (m) { return '<option value="' + m.value + '">' + m.label.split(' ')[0] + '</option>'; }).join('') + '</select>' +
        '<button class="btn iconbtn" id="sim-geneadd">+</button></div>' +
        '<div id="sim-generows"></div></div>' +
        // treatments
        '<div class="group"><div class="uplabel" style="margin-bottom:6px;">Treatments <span style="text-transform:none;font-weight:400;">(exogenous supply)</span>' + info(TIPS.treat) + '</div>' +
        '<div class="addrow"><input id="sim-treatinput" list="sim-nodelist" placeholder="Add node…" />' +
        '<input id="sim-treatval" type="number" step="0.1" value="1" style="width:62px;flex:none;" />' +
        '<button class="btn iconbtn" id="sim-treatadd">+</button></div>' +
        '<div id="sim-treatrows"></div></div>' +
        // run
        '<div class="group" style="display:flex;gap:8px;"><button class="btn primary" id="sim-run" style="flex:1;">Run simulation</button>' +
        '<button class="btn" id="sim-clear" title="Clear">&#8634;</button></div>' +
        // baseline
        '<div class="group" style="border-top:1px solid var(--border);padding-top:12px;">' +
        '<div class="uplabel" style="margin-bottom:6px;">Compare against' + info(TIPS.baseline) + '</div>' +
        '<div class="row2"><button class="btn' + (simState.baselineMode === 'wt' ? ' active' : '') + '" data-base="wt">Wild type</button>' +
        '<button class="btn' + (simState.baselineMode === 'custom' ? ' active' : '') + '" data-base="custom">Custom baseline</button></div>' +
        '<div id="sim-baseeditor"></div></div>' +
        '<p class="footnote">Simulations run entirely in your browser using the ' + esc(SIM.METHOD_LABELS[simState.method]) +
        ' method. Results are model predictions — verify against the literature.</p>';

      // method buttons
      Array.prototype.forEach.call(b.querySelectorAll('#sim-methods .btn'), function (btn) {
        btn.onclick = function () { simState.method = btn.getAttribute('data-m'); buildBuilder(); if (simState.result) run(); };
      });
      // perturbation add
      var gi = b.querySelector('#sim-geneinput'), gm = b.querySelector('#sim-genemod');
      function addGene() {
        var id = gi.value.trim();
        if (!valid(id) || simState.genes.some(function (g) { return g.node === id; })) return;
        simState.genes.push({ node: id, modifier: Number(gm.value) });
        simState.treatments = simState.treatments.filter(function (t) { return t.node !== id; });
        gi.value = ''; refreshPertRows(); repaintRings();
      }
      b.querySelector('#sim-geneadd').onclick = addGene;
      gi.onkeydown = function (e) { if (e.key === 'Enter') { e.preventDefault(); addGene(); } };
      // treatment add
      var ti = b.querySelector('#sim-treatinput'), tv = b.querySelector('#sim-treatval');
      function addTreat() {
        var id = ti.value.trim(), v = parseFloat(tv.value);
        if (!valid(id) || isNaN(v) || simState.treatments.some(function (t) { return t.node === id; })) return;
        simState.treatments.push({ node: id, value: v });
        simState.genes = simState.genes.filter(function (g) { return g.node !== id; });
        ti.value = ''; refreshPertRows(); repaintRings();
      }
      b.querySelector('#sim-treatadd').onclick = addTreat;
      ti.onkeydown = function (e) { if (e.key === 'Enter') { e.preventDefault(); addTreat(); } };
      b.querySelector('#sim-run').onclick = run;
      b.querySelector('#sim-clear').onclick = function () { simState.genes = []; simState.treatments = []; refreshPertRows(); repaintRings(); };
      Array.prototype.forEach.call(b.querySelectorAll('[data-base]'), function (btn) {
        btn.onclick = function () { simState.baselineMode = btn.getAttribute('data-base'); buildBuilder(); };
      });
      if (simState.baselineMode === 'custom') buildBaseEditor();
      refreshPertRows();
    }

    function buildBaseEditor() {
      var host = document.getElementById('sim-baseeditor');
      host.innerHTML =
        '<div style="margin-top:10px;border:1px dashed var(--border);border-radius:8px;padding:10px;">' +
        '<p class="crumb" style="font-size:11px;margin:0 0 8px;">Define the reference condition (e.g. the single mutant) to compare against.</p>' +
        '<div class="addrow"><input id="sim-bgi" list="sim-nodelist" placeholder="Add gene…" />' +
        '<select id="sim-bgm">' + SIM.MODIFIER_LABELS.map(function (m) { return '<option value="' + m.value + '">' + m.label.split(' ')[0] + '</option>'; }).join('') + '</select>' +
        '<button class="btn iconbtn" id="sim-bgadd">+</button></div><div id="sim-bgrows"></div>' +
        '<div class="addrow" style="margin-top:6px;"><input id="sim-bti" list="sim-nodelist" placeholder="Add treatment…" />' +
        '<input id="sim-btv" type="number" step="0.1" value="1" style="width:62px;flex:none;" /><button class="btn iconbtn" id="sim-btadd">+</button></div><div id="sim-btrows"></div>' +
        '</div>';
      var bgi = host.querySelector('#sim-bgi'), bgm = host.querySelector('#sim-bgm');
      host.querySelector('#sim-bgadd').onclick = function () {
        var id = bgi.value.trim();
        if (!valid(id) || simState.baseGenes.some(function (g) { return g.node === id; })) return;
        simState.baseGenes.push({ node: id, modifier: Number(bgm.value) }); bgi.value = ''; refreshBaseRows();
      };
      var bti = host.querySelector('#sim-bti'), btv = host.querySelector('#sim-btv');
      host.querySelector('#sim-btadd').onclick = function () {
        var id = bti.value.trim(), v = parseFloat(btv.value);
        if (!valid(id) || isNaN(v) || simState.baseTreatments.some(function (t) { return t.node === id; })) return;
        simState.baseTreatments.push({ node: id, value: v }); bti.value = ''; refreshBaseRows();
      };
      refreshBaseRows();
    }
    function refreshBaseRows() {
      document.getElementById('sim-bgrows').innerHTML = simState.baseGenes.map(function (g) {
        return pertRowHtml(g.node, modShort(g.modifier), 'bg');
      }).join('');
      document.getElementById('sim-btrows').innerHTML = simState.baseTreatments.map(function (t) {
        return pertRowHtml(t.node, '+' + t.value, 'bt');
      }).join('');
      wireRowRemoves('#sim-bgrows', function (id) { simState.baseGenes = simState.baseGenes.filter(function (g) { return g.node !== id; }); refreshBaseRows(); });
      wireRowRemoves('#sim-btrows', function (id) { simState.baseTreatments = simState.baseTreatments.filter(function (t) { return t.node !== id; }); refreshBaseRows(); });
    }

    function valid(id) { return simState.nodes.some(function (n) { return n.id === id; }); }
    function pertRowHtml(node, tag, kind) {
      return '<div class="pertrow"><span class="mono">' + esc(node) + '</span><span style="display:flex;gap:8px;align-items:center;">' +
        '<span class="chip" style="color:var(--primary);font-weight:700;">' + esc(tag) + '</span>' +
        '<button class="rm" data-kind="' + kind + '" data-id="' + esc(node) + '">&times;</button></span></div>';
    }
    function wireRowRemoves(sel, fn) {
      Array.prototype.forEach.call(document.querySelectorAll(sel + ' .rm'), function (btn) {
        btn.onclick = function () { fn(btn.getAttribute('data-id')); };
      });
    }
    function refreshPertRows() {
      document.getElementById('sim-generows').innerHTML = simState.genes.map(function (g) { return pertRowHtml(g.node, modShort(g.modifier), 'g'); }).join('');
      document.getElementById('sim-treatrows').innerHTML = simState.treatments.map(function (t) { return pertRowHtml(t.node, '+' + t.value, 't'); }).join('');
      wireRowRemoves('#sim-generows', function (id) { simState.genes = simState.genes.filter(function (g) { return g.node !== id; }); refreshPertRows(); repaintRings(); });
      wireRowRemoves('#sim-treatrows', function (id) { simState.treatments = simState.treatments.filter(function (t) { return t.node !== id; }); refreshPertRows(); repaintRings(); });
      var ml = document.getElementById('sim-mutlabel');
      if (ml) ml.textContent = simState.genes.length ? (PERT_WORD[simState.genes.length] || (simState.genes.length + '×')) + ' mutant' : '';
    }

    // ---- sim network graph (reuse FLASHP engine + perturbation rings) ----
    function initSimGraph(net) {
      simApp = window.FLASHP.init({
        container: document.getElementById('sim-cy'),
        data: { meta: { slug: net.slug }, elements: net.elements, style: STYLE, annById: net.annById },
        opts: {
          layout: 'elk', dark: document.documentElement.classList.contains('dark'),
          onReady: function (cy) {
            cy.style()
              .selector('node.pert-ko').style({ 'border-color': RING.ko, 'border-width': 6, 'border-opacity': 1 })
              .selector('node.pert-kd').style({ 'border-color': RING.kd, 'border-width': 6, 'border-opacity': 1 })
              .selector('node.pert-oe').style({ 'border-color': RING.oe, 'border-width': 6, 'border-opacity': 1 })
              .selector('node.exo').style({ 'border-color': RING.exo, 'border-width': 6, 'border-opacity': 1 })
              .update();
            repaintRings();
          },
          onSelect: function (d) { simState.picked = d; renderActionCard(); },
        },
      });
    }
    function repaintRings() {
      if (!simApp || !simApp.cy) return;
      var cy = simApp.cy;
      cy.nodes().removeClass('pert-ko pert-kd pert-oe exo');
      simState.genes.forEach(function (g) {
        var cls = g.modifier === 0 ? 'pert-ko' : g.modifier === 0.5 ? 'pert-kd' : 'pert-oe';
        cy.getElementById(g.node).addClass(cls);
      });
      simState.treatments.forEach(function (t) { cy.getElementById(t.node).addClass('exo'); });
    }
    function renderActionCard() {
      var ac = document.getElementById('sim-actioncard');
      var d = simState.picked;
      if (!d) { ac.className = 'actioncard'; ac.innerHTML = ''; return; }
      var g = simState.genes.find(function (x) { return x.node === d.id; });
      var tr = simState.treatments.find(function (x) { return x.node === d.id; });
      var desc = d.fn || d.desc || '';
      function ab(label, on, color) {
        return '<button class="btn" data-act="' + label + '" style="' + (on ? 'background:' + color + ';border-color:' + color + ';color:#fff;font-weight:700;' : '') + '">' + label + '</button>';
      }
      ac.innerHTML =
        '<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;"><div style="flex:1;min-width:0;">' +
        '<span class="mono" style="font-weight:700;">' + esc(d.id) + '</span> <span class="chip">' + esc(TYPE_LABELS[d.ty] || d.ty) + '</span>' +
        (desc ? '<div class="crumb" style="font-size:11.5px;margin-top:2px;">' + esc(desc) + '</div>' : '') +
        '</div><button class="rm" id="ac-close">&times;</button></div>' +
        '<div class="acbtns">' + ab('KO', g && g.modifier === 0, RING.ko) + ab('KD', g && g.modifier === 0.5, RING.kd) +
        ab('OE', g && g.modifier === 2, RING.oe) + '<span style="width:1px;height:18px;background:var(--border);"></span>' +
        ab('Exogenous', !!tr, RING.exo) +
        ((g || tr) ? '<button class="btn" id="ac-remove" style="margin-left:auto;color:var(--destructive);border-color:transparent;">Remove</button>' : '') +
        '</div>';
      ac.className = 'actioncard show';
      ac.querySelector('#ac-close').onclick = function () { simState.picked = null; renderActionCard(); simApp.clearSelection(); };
      Array.prototype.forEach.call(ac.querySelectorAll('[data-act]'), function (btn) {
        btn.onclick = function () {
          var act = btn.getAttribute('data-act');
          if (act === 'Exogenous') { setTreatment(d.id, !tr); }
          else { setGene(d.id, act === 'KO' ? 0 : act === 'KD' ? 0.5 : 2); }
          renderActionCard();
        };
      });
      var rm = ac.querySelector('#ac-remove');
      if (rm) rm.onclick = function () { setGene(d.id, null); setTreatment(d.id, false); renderActionCard(); };
    }
    function setGene(id, modifier) {
      simState.genes = simState.genes.filter(function (g) { return g.node !== id; });
      if (modifier !== null) { simState.genes.push({ node: id, modifier: modifier }); simState.treatments = simState.treatments.filter(function (t) { return t.node !== id; }); }
      refreshPertRows(); repaintRings();
    }
    function setTreatment(id, on) {
      simState.treatments = simState.treatments.filter(function (t) { return t.node !== id; });
      if (on) { simState.treatments.push({ node: id, value: 1 }); simState.genes = simState.genes.filter(function (g) { return g.node !== id; }); }
      refreshPertRows(); repaintRings();
    }

    // ---- run ----
    function run() {
      var net = simState.net;
      var geneModifiers = {}; simState.genes.forEach(function (g) { geneModifiers[g.node] = g.modifier; });
      var exogenous = {}; simState.treatments.forEach(function (t) { exogenous[t.node] = t.value; });
      var baseMod = {}, baseExo = {};
      if (simState.baselineMode === 'custom') {
        simState.baseGenes.forEach(function (g) { baseMod[g.node] = g.modifier; });
        simState.baseTreatments.forEach(function (t) { baseExo[t.node] = t.value; });
      }
      var baselineLabel = simState.baselineMode === 'custom' ? describe(simState.baseGenes, simState.baseTreatments) : 'Wild type';
      var res = SIM.runSimulation(simState.method, {
        net: net.net, algEq: net.algEq,
        perturbation: { geneModifiers: geneModifiers, exogenous: exogenous },
        baseline: { geneModifiers: baseMod, exogenous: baseExo },
        baselineLabel: baselineLabel, params: net.params,
      });
      simState.result = res;
      simState.testLabel = describe(simState.genes, simState.treatments);
      var final = res.iterations[res.iterations.length - 1].values || {};
      simState.outcome = (simState.outcome && final[simState.outcome] != null) ? simState.outcome : (res.phenotype || '');
      var movers = Object.keys(final).map(function (n) { return { n: n, d: Math.abs((final[n] || 0) - (res.wtValues[n] || 0)) }; })
        .sort(function (a, b) { return b.d - a.d; }).slice(0, 5).map(function (x) { return x.n; });
      var seed = {};
      if (res.phenotype) seed[res.phenotype] = true;
      simState.genes.forEach(function (g) { seed[g.node] = true; });
      movers.forEach(function (m) { seed[m] = true; });
      simState.selected = Object.keys(seed).slice(0, 8);
      renderResults();
    }

    // ---- results ----
    function renderResults() {
      var host = document.getElementById('sim-results');
      var res = simState.result;
      if (!res) {
        host.innerHTML = '<div class="empty"><div style="font-size:30px;opacity:.5;">&#9879;</div>' +
          '<p style="color:var(--fg);font-weight:600;margin:8px 0 2px;">Design a perturbation, then run.</p>' +
          '<p style="max-width:320px;font-size:13px;">Add one or more gene knockouts / overexpressions or a treatment, choose a method, and hit <b>Run simulation</b>.</p></div>';
        return;
      }
      var rwr = res.method === 'rwr';
      var isCustom = res.baselineLabel !== 'Wild type';
      var mode = rwr ? 'relative' : (simState.valuesMode === 'absolute' && !isCustom ? 'relative' : simState.valuesMode);
      var foldLike = mode === 'relative' || mode === 'log2';

      var modes = [{ k: 'log2', l: 'log₂ fold change' }, { k: 'relative', l: isCustom ? 'Fold vs baseline' : 'Fold (WT = 1)' }];
      if (isCustom) modes.push({ k: 'absolute', l: 'Absolute' });

      host.innerHTML = '<div class="inner">' +
        summaryHtml(res, mode) +
        (!rwr ? '<div class="ymodes"><span class="uplabel" style="font-weight:400;">Y-axis' + info(TIPS.yaxis) + '</span>' +
          modes.map(function (m) { return '<span class="pill' + (mode === m.k ? ' active' : '') + '" data-y="' + m.k + '">' + m.l + '</span>'; }).join('') + '</div>' : '') +
        '<div class="block"><h3>' + chartTitle(res, mode) + '</h3><div id="sim-chart"></div></div>' +
        '<div class="block"><h3>Nodes <span style="text-transform:none;color:var(--muted);">— click to toggle on the chart</span></h3>' +
        '<div style="position:relative;margin-bottom:8px;"><input id="sim-tablefilter" placeholder="Filter nodes…" style="width:100%;" /></div>' +
        '<div class="ntable"><div class="head"><span style="text-align:left;">Node</span><span>WT</span><span>' +
        (rwr ? 'Signal' : foldLike ? 'Fold' : 'Value') + '</span><span>' + (rwr ? 'Δ' : foldLike ? 'Change' : 'Ratio') + '</span></div>' +
        '<div class="scroll" id="sim-tbody"></div></div></div>' +
        '</div>';

      // outcome select
      var osel = host.querySelector('#sim-outcome');
      if (osel) osel.onchange = function () { simState.outcome = osel.value; if (simState.selected.indexOf(osel.value) < 0) simState.selected.push(osel.value); renderResults(); };
      // y modes
      Array.prototype.forEach.call(host.querySelectorAll('[data-y]'), function (p) {
        p.onclick = function () { simState.valuesMode = p.getAttribute('data-y'); renderResults(); };
      });
      // table
      var filterEl = host.querySelector('#sim-tablefilter');
      filterEl.oninput = function () { renderTable(filterEl.value, foldLike, rwr); };
      renderTable('', foldLike, rwr);
      drawChart(res, foldLike, mode);
    }

    function chartTitle(res, mode) {
      if (res.method === 'rwr') return 'Node signals over iterations';
      if (mode === 'log2') return 'Node values over iterations (log₂ fold change)';
      if (mode === 'relative') return 'Node values over iterations (fold vs baseline)';
      return 'Node values over iterations';
    }

    function summaryHtml(res, mode) {
      var rwr = res.method === 'rwr';
      var final = res.iterations[res.iterations.length - 1].values || {};
      var outcome = simState.outcome || res.phenotype || '';
      var value = final[outcome] != null ? final[outcome] : 0;
      var base = res.wtValues[outcome] != null ? res.wtValues[outcome] : (rwr ? 0 : 1);
      var dir, metric, metricLabel;
      if (rwr) {
        var diff = value - base;
        dir = diff > 1e-5 ? 'increased' : diff < -1e-5 ? 'decreased' : 'unchanged';
        metric = (diff >= 0 ? '+' : '') + diff.toFixed(3); metricLabel = 'Signal Δ vs baseline';
      } else {
        var ratio = base !== 0 ? value / base : value > 0 ? Infinity : 1;
        dir = ratio > 1.05 ? 'increased' : ratio < 0.95 ? 'decreased' : 'unchanged';
        if (mode === 'log2') { var l = Math.log2(Math.max(ratio, 1e-4)); metric = isFinite(l) ? (l >= 0 ? '+' : '') + l.toFixed(2) : (ratio > 0 ? '+∞' : '−∞'); metricLabel = 'log₂ fold vs baseline'; }
        else if (mode === 'absolute') { metric = value.toFixed(2); metricLabel = 'Predicted value'; }
        else { metric = isFinite(ratio) ? ratio.toFixed(2) + '×' : '∞×'; metricLabel = 'Fold vs baseline'; }
      }
      var color = dir === 'increased' ? 'var(--pos)' : dir === 'decreased' ? 'var(--neg)' : 'var(--muted)';
      var arrow = dir === 'increased' ? '↑' : dir === 'decreased' ? '↓' : '−';
      var options = (res.phenotype ? '<option value="' + esc(res.phenotype) + '">' + esc(res.phenotype) + ' (phenotype)</option>' : '') +
        simState.nodes.filter(function (n) { return n.id !== res.phenotype; }).map(function (n) { return '<option value="' + esc(n.id) + '">' + esc(n.id) + '</option>'; }).join('');
      function cond(label) { return (label || '—').split(' + ').map(function (t) { return esc(t); }).join('<br>'); }
      return '<div class="summary">' +
        '<div class="cell"><div class="k">Outcome' + info(TIPS.outcome) + '</div><select id="sim-outcome" style="font-weight:700;">' + options + '</select></div>' +
        '<div class="cell"><div class="k">Predicted</div><div class="v" style="color:' + color + ';text-transform:capitalize;">' + arrow + ' ' + dir + '</div></div>' +
        '<div class="cell"><div class="k">' + metricLabel + '</div><div class="v">' + metric + '</div></div>' +
        '<div class="cell"><div class="k">Condition</div><div class="v" style="font-size:14px;">' + cond(simState.testLabel) + '</div></div>' +
        '<div class="cell"><div class="k">vs Baseline</div><div class="v" style="font-size:14px;">' + cond(res.baselineLabel) + '</div></div>' +
        '<div class="cell"><div class="k">Method</div><div class="v">' + esc(SIM.METHOD_LABELS[res.method]) + '</div></div>' +
        '<div class="cell" style="margin-left:auto;"><div class="k">Convergence' + info(TIPS.converge, 'left') + '</div><div class="crumb" style="font-size:11px;">' +
        (res.converged ? 'converged at iteration ' + res.convergedAt : 'did not fully converge') + '</div></div>' +
        '</div>';
      // re-set outcome select value after render
    }

    function setOutcomeValue() {
      var osel = document.getElementById('sim-outcome');
      if (osel) osel.value = simState.outcome || (simState.result && simState.result.phenotype) || '';
    }

    function renderTable(query, foldLike, rwr) {
      var res = simState.result;
      var final = res.iterations[res.iterations.length - 1].values || {};
      var fold = foldLike && !rwr;
      var rows = Object.keys(final).map(function (node) {
        var base = res.wtValues[node] != null ? res.wtValues[node] : (rwr ? 0 : 1);
        var raw = final[node] || 0;
        var safe = Math.abs(base) > 1e-6;
        var wt = fold ? 1 : base;
        var value = fold ? (safe ? raw / base : raw) : raw;
        var delta = fold ? value - 1 : value - base;
        return { node: node, wt: wt, value: value, delta: delta };
      });
      rows.sort(function (a, b) { return Math.abs(b.delta) - Math.abs(a.delta); });
      var q = (query || '').trim().toLowerCase();
      if (q) rows = rows.filter(function (r) { return r.node.toLowerCase().indexOf(q) >= 0; });
      var sel = {}; simState.selected.forEach(function (n) { sel[n] = true; });
      var tbody = document.getElementById('sim-tbody');
      tbody.innerHTML = rows.map(function (r) {
        var dir = r.delta > 1e-4 ? 'up' : r.delta < -1e-4 ? 'down' : 'flat';
        // Fold mode: big/small folds read better as a ×-multiplier (e.g. 94×, 0.01×);
        // keep the +/-% form only for modest changes near 1.
        var changeText = rwr ? (r.delta >= 0 ? '+' : '') + r.delta.toFixed(2)
          : fold ? (r.value >= 2 || r.value <= 0.5 ? r.value.toFixed(2) + '×'
            : (r.value >= 1 ? '+' : '') + ((r.value - 1) * 100).toFixed(0) + '%')
            : (r.wt !== 0 ? r.value / r.wt : r.value).toFixed(2) + '×';
        var col = dir === 'up' ? 'var(--pos)' : dir === 'down' ? 'var(--neg)' : 'var(--muted)';
        var arrow = dir === 'up' ? '↑' : dir === 'down' ? '↓' : '−';
        return '<div class="trow' + (sel[r.node] ? ' sel' : '') + '" data-node="' + esc(r.node) + '">' +
          '<span class="name"><span class="dot' + (sel[r.node] ? ' on' : '') + '"></span>' + esc(r.node) + '</span>' +
          '<span style="color:var(--muted);">' + r.wt.toFixed(2) + '</span>' +
          '<span style="font-weight:600;">' + r.value.toFixed(2) + '</span>' +
          '<span style="color:' + col + ';">' + arrow + ' ' + changeText + '</span></div>';
      }).join('');
      Array.prototype.forEach.call(tbody.querySelectorAll('.trow'), function (rowEl) {
        rowEl.onclick = function () {
          var node = rowEl.getAttribute('data-node');
          var i = simState.selected.indexOf(node);
          if (i >= 0) simState.selected.splice(i, 1); else simState.selected.push(node);
          renderTable(query, foldLike, rwr); drawChart(res, foldLike, simState.valuesMode);
        };
      });
      setOutcomeValue();
    }

    function drawChart(res, foldLike, mode) {
      var rwr = res.method === 'rwr';
      var container = document.getElementById('sim-chart');
      if (!container) return;
      window.FLASHPCHART.render(container, {
        result: res, selectedNodes: simState.selected,
        normalizeBy: (foldLike && !rwr) ? res.wtValues : null,
        log2: mode === 'log2' && !rwr,
      });
    }

    // ---- resize handling ----
    var rt;
    window.addEventListener('resize', function () {
      clearTimeout(rt);
      rt = setTimeout(function () {
        if (viewApp && viewApp.cy) viewApp.cy.resize();
        if (simApp && simApp.cy) simApp.cy.resize();
        if (simState.result && document.getElementById('view-sim').classList.contains('show')) {
          var res = simState.result, rwr = res.method === 'rwr';
          var isCustom = res.baselineLabel !== 'Wild type';
          var mode = rwr ? 'relative' : (simState.valuesMode === 'absolute' && !isCustom ? 'relative' : simState.valuesMode);
          drawChart(res, mode === 'relative' || mode === 'log2', mode);
        }
      }, 180);
    });

    // ---- image download helper ----
    function download(name, dataUrl) {
      var a = document.createElement('a');
      a.href = dataUrl; a.download = name; document.body.appendChild(a); a.click(); a.remove();
    }

    // ---- floating tooltips (position:fixed so they escape every overflow/clip container) ----
    (function () {
      var tip = document.createElement('div');
      tip.className = 'floatingtip';
      tip.style.cssText = 'position:fixed;z-index:9999;max-width:280px;background:var(--card);color:var(--fg);' +
        'border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:11.5px;font-weight:400;' +
        'line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(0,0,0,.16);pointer-events:none;' +
        'opacity:0;visibility:hidden;transition:opacity .12s;white-space:normal;';
      document.body.appendChild(tip);
      function show(t) {
        var msg = t.getAttribute('data-tip'); if (!msg) return;
        tip.textContent = msg; tip.style.visibility = 'hidden'; tip.style.opacity = '0'; tip.style.left = '0px'; tip.style.top = '0px';
        var r = t.getBoundingClientRect(), tr = tip.getBoundingClientRect(), pad = 8, gap = 8;
        var left = r.left + r.width / 2 - tr.width / 2;
        left = Math.max(pad, Math.min(left, window.innerWidth - tr.width - pad));
        var top = r.bottom + gap;
        if (top + tr.height > window.innerHeight - pad) top = r.top - gap - tr.height; // flip up if no room below
        tip.style.left = left + 'px'; tip.style.top = Math.max(pad, top) + 'px';
        tip.style.visibility = 'visible'; tip.style.opacity = '1';
      }
      function hide() { tip.style.opacity = '0'; tip.style.visibility = 'hidden'; }
      document.addEventListener('mouseover', function (e) {
        var t = e.target.closest && e.target.closest('.info'); if (t) show(t);
      });
      document.addEventListener('mouseout', function (e) {
        if (e.target.closest && e.target.closest('.info')) hide();
      });
      window.addEventListener('scroll', hide, true);
    })();

    renderBrowse();
    setView('browse');
  })();
  </script>
</body>
</html>
