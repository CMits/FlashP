<!DOCTYPE html>
<!--
  FLASH-P standalone network visualiser — generated by network_to_visual.py.
  Self-contained: graph data, style and JS are embedded below. Renders the same
  interactive Cytoscape graph as the FLASH-P website. Click a node to see its
  function and the DOIs of its edges. Markers FLASHP_LIBS / FLASHP_GRAPH_JS /
  FLASHP_DATA / FLASHP_TITLE are substituted by the Python generator.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FLASH-P · <!--FLASHP_TITLE--></title>
  <style>
    :root {
      --bg: #fbfdfc; --fg: #13251c; --muted: #5b6b63; --card: #ffffff;
      --border: #d7e0db; --grid: #e3ebe6; --accent: #d9930b;
      --pos: #2c7fb8; --neg: #d7301f;
    }
    html.dark {
      --bg: hsl(192 32% 8%); --fg: #e7efe9; --muted: #9fb3aa; --card: #11242a;
      --border: #24383f; --grid: rgba(120,150,140,0.18);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif; color: var(--fg);
      background: var(--bg); overflow: hidden;
    }
    #cy {
      position: absolute; inset: 0;
      background-color: var(--bg);
      background-image: radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
      background-size: 22px 22px;
    }
    .panelbar {
      position: absolute; z-index: 5; display: flex; gap: 6px; flex-wrap: wrap;
      align-items: center; padding: 5px; border: 1px solid var(--border);
      background: var(--card); border-radius: 9px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    #toolbar { left: 12px; top: 12px; max-width: calc(100% - 24px); }
    #toolbar select, #toolbar button {
      height: 30px; border: 1px solid var(--border); background: var(--bg);
      color: var(--fg); border-radius: 6px; cursor: pointer; font-size: 12.5px;
      padding: 0 8px;
    }
    #toolbar button { width: 32px; padding: 0; font-size: 15px; line-height: 1; }
    #toolbar button.active { background: var(--border); }
    #toolbar .sep { width: 1px; align-self: stretch; background: var(--border); margin: 2px 1px; }
    .title {
      position: absolute; right: 12px; top: 12px; z-index: 5; max-width: 40%;
      padding: 7px 11px; border: 1px solid var(--border); background: var(--card);
      border-radius: 9px; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-size: 12.5px;
    }
    .title b { font-size: 13.5px; } .title .sp { color: var(--muted); font-style: italic; }
    #legend { left: 12px; bottom: 12px; flex-direction: column; align-items: flex-start; font-size: 12px; }
    #legend h4 { margin: 2px 0 4px; font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
    #legend .row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    #legend .sw { width: 13px; height: 13px; border-radius: 3px; flex: none; }
    #legend .ln { width: 18px; height: 0; border-top-width: 2px; border-top-style: solid; flex: none; }
    #panel {
      position: absolute; right: 12px; top: 64px; bottom: 12px; width: 310px; max-width: calc(100% - 24px);
      z-index: 6; overflow: auto; padding: 14px; border: 1px solid var(--border);
      background: var(--card); border-radius: 11px; box-shadow: 0 2px 10px rgba(0,0,0,.12);
      display: none; font-size: 13px; line-height: 1.45;
    }
    #panel.show { display: block; }
    #panel .close { float: right; cursor: pointer; color: var(--muted); border: none; background: none; font-size: 18px; }
    #panel h2 { margin: 0 0 2px; font-size: 17px; }
    #panel .ty { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    #panel .badge { display: inline-block; font-size: 10.5px; padding: 1px 7px; border-radius: 999px; background: var(--border); color: var(--fg); margin-left: 6px; vertical-align: middle; }
    #panel .fn { margin: 6px 0 10px; }
    #panel .desc { color: var(--muted); margin: 0 0 12px; }
    #panel h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 12px 0 5px; }
    #panel ul { list-style: none; margin: 0; padding: 0; }
    #panel li { margin: 4px 0; }
    #panel .arrow { font-weight: 700; }
    #panel a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; font-size: 11.5px; }
    #panel .nodoi { color: var(--muted); font-size: 11.5px; }
    .hint { position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%); z-index: 4; color: var(--muted); font-size: 12px; pointer-events: none; }
  </style>
  <!--FLASHP_LIBS-->
</head>
<body>
  <div id="cy"></div>

  <div id="toolbar" class="panelbar">
    <select id="layout" title="Layout"></select>
    <button id="relayout" title="Re-run layout">↻</button>
    <span class="sep"></span>
    <button id="fit" title="Fit to view">⤢</button>
    <button id="zin" title="Zoom in">+</button>
    <button id="zout" title="Zoom out">−</button>
    <button id="labels" title="Toggle labels">T</button>
    <button id="theme" title="Toggle dark mode">◐</button>
    <span class="sep"></span>
    <button id="dlpng" title="Download PNG" style="width:auto;padding:0 8px;font-size:12px;">PNG</button>
    <button id="dlsvg" title="Download SVG" style="width:auto;padding:0 8px;font-size:12px;">SVG</button>
  </div>

  <div class="title"><b><!--FLASHP_TITLE--></b></div>

  <div id="legend" class="panelbar"></div>

  <div id="panel"></div>

  <div class="hint">Click a node to inspect its function and edge DOIs · scroll to zoom · drag to pan</div>

  <script id="flashp-data" type="application/json"><!--FLASHP_DATA--></script>
  <script><!--FLASHP_GRAPH_JS--></script>
  <script>
  (function () {
    var data = JSON.parse(document.getElementById('flashp-data').textContent);
    var panel = document.getElementById('panel');

    function doiLink(doi) {
      if (!doi) return '<span class="nodoi">no DOI</span>';
      var url = 'https://doi.org/' + encodeURI(doi);
      return '<a href="' + url + '" target="_blank" rel="noopener">' + doi + '</a>';
    }
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }

    function renderPanel(d) {
      if (!d) { panel.className = ''; panel.innerHTML = ''; return; }
      var labels = app.TYPE_LABELS;
      var rows = function (list, dir) {
        if (!list.length) return '<li class="nodoi">none</li>';
        return list.map(function (e) {
          var arrow = e.neg ? '⊣' : '→';
          var col = e.neg ? 'var(--neg)' : 'var(--pos)';
          var left = dir === 'in' ? esc(e.other) : esc(d.id);
          var right = dir === 'in' ? esc(d.id) : esc(e.other);
          return '<li><span class="arrow" style="color:' + col + '">' + left + ' ' + arrow + ' ' + right +
            '</span><br>' + doiLink(e.doi) + '</li>';
        }).join('');
      };
      panel.innerHTML =
        '<button class="close" title="Close" onclick="window.__clear()">×</button>' +
        '<h2>' + esc(d.id) + (d.src ? '<span class="badge">source</span>' : '') + '</h2>' +
        '<div class="ty">' + esc(labels[d.ty] || d.ty) + '</div>' +
        (d.fn ? '<div class="fn">' + esc(d.fn) + '</div>' : '') +
        (d.desc ? '<div class="desc">' + esc(d.desc) + '</div>' : '') +
        '<h3>Regulated by (' + d.incomers.length + ')</h3><ul>' + rows(d.incomers, 'in') + '</ul>' +
        '<h3>Regulates (' + d.outgoers.length + ')</h3><ul>' + rows(d.outgoers, 'out') + '</ul>';
      panel.className = 'show';
    }

    var app = window.FLASHP.init({
      container: document.getElementById('cy'),
      data: data,
      opts: { layout: 'elk', dark: false, onSelect: renderPanel },
    });
    window.__clear = function () { app.clearSelection(); };

    // ---- toolbar wiring ----
    var sel = document.getElementById('layout');
    Object.keys(app.LAYOUT_LABELS).forEach(function (k) {
      var o = document.createElement('option');
      o.value = k; o.textContent = app.LAYOUT_LABELS[k];
      sel.appendChild(o);
    });
    sel.value = 'elk';
    sel.onchange = function () { app.applyLayout(sel.value); };
    document.getElementById('relayout').onclick = function () { app.applyLayout(sel.value); };
    document.getElementById('fit').onclick = function () { app.fit(); };
    var zoomBy = function (f) {
      var cy = app.cy, b = cy.container().getBoundingClientRect();
      cy.zoom({ level: cy.zoom() * f, renderedPosition: { x: b.width / 2, y: b.height / 2 } });
    };
    document.getElementById('zin').onclick = function () { zoomBy(1.3); };
    document.getElementById('zout').onclick = function () { zoomBy(1 / 1.3); };
    var labelsOn = true;
    document.getElementById('labels').onclick = function () {
      labelsOn = !labelsOn; app.toggleLabels(labelsOn);
      this.classList.toggle('active', !labelsOn);
    };
    var dark = false;
    document.getElementById('theme').onclick = function () {
      dark = !dark; document.documentElement.classList.toggle('dark', dark); app.setTheme(dark);
    };

    function download(name, dataUrl) {
      var a = document.createElement('a');
      a.href = dataUrl; a.download = name; document.body.appendChild(a); a.click(); a.remove();
    }
    document.getElementById('dlpng').onclick = function () {
      download((data.meta && data.meta.slug || 'network') + '.png',
        app.cy.png({ full: true, scale: 3, bg: dark ? '#0e1b1f' : '#fbfdfc' }));
    };
    document.getElementById('dlsvg').onclick = function () {
      if (!app.cy.svg) { alert('SVG export unavailable (cytoscape-svg not loaded).'); return; }
      var svg = app.cy.svg({ full: true, bg: dark ? '#0e1b1f' : '#fbfdfc' });
      download((data.meta && data.meta.slug || 'network') + '.svg',
        'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg));
    };

    // ---- legend ----
    var lg = document.getElementById('legend');
    var present = app.present.slice().sort();
    var html = '<h4>Node type</h4>';
    present.forEach(function (ty) {
      html += '<div class="row"><span class="sw" style="background:' + app.pick(data.style.node.fill, ty) +
        ';border:1.5px solid ' + app.pick(data.style.node.border, ty) + '"></span>' +
        (app.TYPE_LABELS[ty] || ty) + '</div>';
    });
    html += '<h4 style="margin-top:8px">Edge</h4>' +
      '<div class="row"><span class="ln" style="border-color:' + app.pick(data.style.edge.line, 'positive') + '"></span>activates (→)</div>' +
      '<div class="row"><span class="ln" style="border-color:' + app.pick(data.style.edge.line, 'negative') + '"></span>inhibits (⊣)</div>';
    lg.innerHTML = html;
  })();
  </script>
</body>
</html>
